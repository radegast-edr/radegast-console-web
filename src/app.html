<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" type="image/x-icon" href="%sveltekit.assets%/favicon.ico" />
		<link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicon-32.png" />
		<link rel="icon" type="image/png" sizes="192x192" href="%sveltekit.assets%/favicon-192.png" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/favicon-192.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<style>
			:root {
				color-scheme: light dark;
				--bs-border-radius: 3px !important;
				--bs-border-radius-sm: 2px !important;
				--bs-border-radius-lg: 4px !important;
				--bs-border-radius-xl: 4px !important;
				--bs-border-radius-2xl: 4px !important;
				--bs-border-radius-pill: 9999px !important;
			}
			body {
				font-family: 'Open Sans', -apple-system, sans-serif;
			}
			pre, code, .font-monospace {
				font-family: 'Hack', monospace !important;
			}

			/* Global Reset to Sharp Design (Removing AI-style generic curves & soft shadows) */
			.card, .modal-content, .toast, .dropdown-menu, .alert, .nav-link, .btn, .form-control, .form-select, .badge, .list-group-item {
				border-radius: 3px !important;
			}

			.card, .modal-content, .toast, .dropdown-menu, .alert {
				border: 1px solid var(--bs-border-color) !important;
				box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.05) !important;
			}

			[data-bs-theme="dark"] .card, 
			[data-bs-theme="dark"] .modal-content, 
			[data-bs-theme="dark"] .toast, 
			[data-bs-theme="dark"] .dropdown-menu, 
			[data-bs-theme="dark"] .alert {
				box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.25) !important;
			}

			/* Premium Cybersecurity Dark Mode Theme */
			[data-bs-theme="dark"] {
				/* Softer Midnight Slate Canvas (not pitch black) */
				--bs-body-bg: #0e131b !important;
				--bs-body-bg-rgb: 14, 19, 27 !important;
				--bs-body-color: #f1f5f9 !important;
				--bs-body-color-rgb: 241, 245, 249 !important;

				/* Sidebar / Containers */
				--bs-secondary-bg: #141b25 !important;
				--bs-secondary-bg-rgb: 20, 27, 37 !important;

				/* Cards, inputs and dropdowns */
				--bs-tertiary-bg: #1e2633 !important;
				--bs-tertiary-bg-rgb: 30, 38, 51 !important;

				/* Hard borders */
				--bs-border-color: #2d3748 !important;
				--bs-border-color-translucent: rgba(255, 255, 255, 0.12) !important;

				/* Text contrast fixes (ensuring subheadings, muted labels, icons are clear) */
				--bs-secondary-color: #94a3b8 !important;
				--bs-secondary-color-rgb: 148, 163, 184 !important;
				--bs-tertiary-color: #64748b !important;
				--bs-tertiary-color-rgb: 100, 116, 139 !important;

				/* Vibrant Electric Accents (Solid and highly legible) */
				--bs-primary: #38bdf8 !important;
				--bs-primary-rgb: 56, 189, 248 !important;
				--bs-link-color: #38bdf8 !important;
				--bs-link-hover-color: #7dd3fc !important;
				
				--bs-success: #10b981 !important;
				--bs-success-rgb: 16, 185, 129 !important;
				
				--bs-warning: #f59e0b !important;
				--bs-warning-rgb: 245, 158, 11 !important;
			}

			/* High contrast button readability overrides for dark mode */
			[data-bs-theme="dark"] .btn-primary {
				color: #000000 !important;
				font-weight: 600 !important;
			}
			[data-bs-theme="dark"] .btn-success {
				color: #000000 !important;
				font-weight: 600 !important;
			}
			[data-bs-theme="dark"] .nav-link.active {
				color: #000000 !important;
				font-weight: 600 !important;
			}

			/* Premium Crisp Light Mode Theme */
			[data-bs-theme="light"] {
				--bs-body-bg: #f8fafc !important;
				--bs-body-bg-rgb: 248, 250, 252 !important;
				--bs-body-color: #0f172a !important;
				--bs-body-color-rgb: 15, 23, 42 !important;

				--bs-secondary-bg: #f1f5f9 !important;
				--bs-secondary-bg-rgb: 241, 245, 249 !important;

				--bs-tertiary-bg: #ffffff !important;
				--bs-tertiary-bg-rgb: 255, 255, 255 !important;

				--bs-border-color: #cbd5e1 !important;
				--bs-border-color-translucent: rgba(15, 23, 42, 0.08) !important;

				--bs-primary: #0f172a !important;
				--bs-primary-rgb: 15, 23, 42 !important;
			}
		</style>
		<script>
			// Prevent FOUC
			const storedTheme = localStorage.getItem('radegast-theme');
			const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
			const theme = storedTheme === 'auto' || !storedTheme ? (systemDark ? 'dark' : 'light') : storedTheme;
			document.documentElement.setAttribute('data-bs-theme', theme);
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
