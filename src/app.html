<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" type="image/x-icon" href="%sveltekit.assets%/favicon.ico" />
		<link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicon-32.png" />
		<link rel="icon" type="image/png" sizes="192x192" href="%sveltekit.assets%/favicon-192.png" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/favicon-192.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<style>
			:root { color-scheme: light dark; }
			body { font-family: 'Open Sans', -apple-system, sans-serif; }
			pre, code, .font-monospace { font-family: 'Hack', monospace !important; }
		</style>
		<script>
			// Prevent FOUC
			const storedTheme = localStorage.getItem('radegast-theme');
			const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
			const theme = storedTheme === 'auto' || !storedTheme ? (systemDark ? 'dark' : 'light') : storedTheme;
			document.documentElement.setAttribute('data-bs-theme', theme);
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
